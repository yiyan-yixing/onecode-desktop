name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: cargo check / clippy (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-13, windows-2022]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Tauri system deps (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install frontend deps & sync static assets
        run: |
          npm install
          npm run copy-static
        shell: bash

      - name: cargo check
        working-directory: src-tauri
        run: cargo check --all-targets

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        working-directory: src-tauri
        run: cargo test

      - name: npm test
        run: npm test

      - name: Frontend syntax check
        shell: bash
        run: |
          for f in src/*.js src/terminal/*.js; do node --check "$f"; done
