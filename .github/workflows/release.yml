name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-mac:
    name: Build macOS (Apple Silicon)
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps & sync static assets
        run: |
          npm install
          npm run copy-static

      - name: Build bundle
        run: npm run build

      # TODO: Apple code signing — 需配置 APPLE_CERTIFICATE 等 secrets
      # - name: Sign app
      #   run: ...

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: onecode-desktop-macos-arm64
          path: target/release/bundle/dmg/*.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/bundle/dmg/*.dmg
