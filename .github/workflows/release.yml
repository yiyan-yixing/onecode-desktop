name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-mac:
    name: Build macOS (Apple Silicon)
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps & sync static assets
        run: |
          npm install
          npm run copy-static

      - name: Build bundle
        run: npm run build

      # TODO: Apple code signing + notarization — 需配置以下 secrets：
      #   APPLE_CERTIFICATE_BASE64: Developer ID Application 证书 (p12, base64)
      #   APPLE_CERTIFICATE_PASSWORD: 证书密码
      #   APPLE_ID: Apple ID 邮箱
      #   APPLE_TEAM_ID: Team ID
      #   APPLE_APP_PASSWORD: App-specific password (appleid.apple.com)
      #
      # - name: Import certificate
      #   uses: apple-actions/import-codesign-certs@v2
      #   with:
      #     p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      #     p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      #
      # - name: Sign app
      #   run: |
      #     APP_PATH="target/release/bundle/macos/OneCode Desktop.app"
      #     codesign --force --deep --sign "Developer ID Application: ..." "$APP_PATH"
      #
      # - name: Notarize
      #   run: |
      #     xcrun notarytool submit "target/release/bundle/dmg/OneCode Desktop_${{ steps.version.outputs.version }}_aarch64.dmg" \
      #       --apple-id "${{ secrets.APPLE_ID }}" \
      #       --team-id "${{ secrets.APPLE_TEAM_ID }}" \
      #       --password "${{ secrets.APPLE_APP_PASSWORD }}" \
      #       --wait

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: onecode-desktop-macos-arm64
          path: target/release/bundle/dmg/*.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/bundle/dmg/*.dmg
