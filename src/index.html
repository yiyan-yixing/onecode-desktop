<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OneCode</title>
  <link rel="stylesheet" href="static/xterm.css">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="wizard.css">
</head>
<body>
  <!-- Cowork Shell: titlebar + content + statusbar -->
  <div class="app" id="app">

    <!-- Title Bar -->
    <div class="titlebar" id="titlebar" data-tauri-drag-region>
      <button class="titlebar-btn" id="sidebarToggle" title="折叠/展开侧边栏 (⌘B)">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="12" height="12" rx="2"/>
          <line x1="6" y1="2" x2="6" y2="14"/>
        </svg>
      </button>
    </div>

    <!-- Main Content: Sidebar + Terminal -->
    <div class="content">
      <!-- Sidebar (warm, left) -->
      <nav class="sidebar" id="orbital"></nav>

      <!-- Terminal Panel (dark) -->
      <div class="term-panel">
        <div class="term-viewport" id="termViewport"></div>
        <!-- Empty state -->
        <div class="term-empty" id="termEmpty">
          <div class="empty-orb" id="emptyOrb">
            <span class="empty-orb-icon">{ }</span>
          </div>
          <div class="empty-title">OneCode</div>
          <div class="empty-subtitle">AI-native development environment</div>
          <div class="empty-kbd">
            <kbd>⌘K</kbd> <span>to begin</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Status Bar -->
    <footer class="statusbar" id="ribbon">
      <div class="statusbar-item">
        <span class="statusbar-dot" id="ribbonDot"></span>
        <span id="ribbonStatus">Ready</span>
      </div>
      <span class="ribbon-warn" id="healthWarn"></span>
      <div class="statusbar-item" id="ribbonCount">0</div>
      <div class="ribbon-badges" id="ribbonBadges"></div>
      <div class="statusbar-spacer"></div>
      <span class="statusbar-kbd">⌘B</span> <span style="margin-right:6px">Sidebar</span>
      <span class="statusbar-kbd">⇧⌘T</span> <span style="margin-right:6px">New in Project</span>
      <span class="statusbar-kbd">⌘W</span> <span style="margin-right:6px">Close</span>
      <span class="statusbar-kbd">⌘1-9</span> <span>Switch</span>
    </footer>
  </div>

  <!-- Floating: Command Palette (Cmd+K) -->
  <div class="palette-overlay" id="paletteOverlay">
    <div class="palette" id="palette">
      <div class="palette-search">
        <input type="text" class="palette-input" id="paletteInput" placeholder="type a command or search…" autocomplete="off" spellcheck="false">
      </div>
      <div class="palette-results" id="paletteResults"></div>
      <div class="palette-footer">
        <span class="palette-hint"><kbd>↑↓</kbd> navigate  <kbd>↵</kbd> select  <kbd>⎋</kbd> close</span>
      </div>
    </div>
  </div>

  <!-- Floating: @Mention Portal -->
  <div class="mention-portal" id="mentionPortal"></div>

  <!-- Floating: Notification Ripples -->
  <div class="ripple-layer" id="rippleLayer"></div>

  <!-- xterm.js + addons (UMD globals) -->
  <script src="static/xterm.min.js"></script>
  <script src="static/addon-fit.min.js"></script>
  <script src="static/addon-web-links.min.js"></script>

  <script type="module" src="main.js"></script>
</body>
</html>
